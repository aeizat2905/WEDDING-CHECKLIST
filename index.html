<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hafiza & Aeizat — Perancangan Majlis</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #c8866a;
    --rose-light: #f0d9cf;
    --rose-pale: #fdf6f2;
    --gold: #b8976a;
    --gold-light: #e8d5b0;
    --sage: #8a9e8c;
    --cream: #faf7f2;
    --ink: #2a2220;
    --ink-soft: #5a4f4b;
    --ink-muted: #9a8e8a;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(42,34,32,0.08);
    --shadow-lg: 0 12px 48px rgba(42,34,32,0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LANDING ── */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #fdf8f5 0%, #f5ede7 50%, #ede4dc 100%);
  }

  .landing-bg {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(200,134,106,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 20%, rgba(184,151,106,0.10) 0%, transparent 60%);
    pointer-events: none;
  }

  .petals {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }

  .petal {
    position: absolute;
    width: 6px; height: 10px;
    background: rgba(200,134,106,0.18);
    border-radius: 50% 50% 50% 0;
    animation: fallPetal linear infinite;
  }

  @keyframes fallPetal {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }

  .landing-content {
    position: relative; z-index: 1;
    text-align: center;
    padding: 2rem;
    animation: fadeUp 1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .landing-ornament {
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: 0.5rem;
    margin-bottom: 1.5rem;
    opacity: 0.7;
  }

  .landing-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 300;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  .landing-title em {
    font-style: italic;
    color: var(--rose);
  }

  .landing-subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.25rem;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.5rem;
  }

  .landing-dates {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.1rem;
    margin-bottom: 3rem;
  }

  .landing-divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.5rem auto;
  }

  .landing-prompt {
    font-size: 0.75rem;
    letter-spacing: 0.2rem;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 2rem;
  }

  .user-cards {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .user-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(200,134,106,0.2);
    border-radius: 20px;
    padding: 2.5rem 3rem;
    cursor: pointer;
    transition: all 0.3s ease;
    min-width: 160px;
    position: relative;
    overflow: hidden;
  }

  .user-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(200,134,106,0.08), rgba(184,151,106,0.08));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .user-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--rose); }
  .user-card:hover::before { opacity: 1; }

  .user-card-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .user-card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }
  .user-card-role {
    font-size: 0.7rem;
    letter-spacing: 0.15rem;
    text-transform: uppercase;
    color: var(--rose);
  }

  /* ── APP ── */
  #app { display: none; min-height: 100vh; }

  /* Header */
  .app-header {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,134,106,0.15);
    position: sticky; top: 0; z-index: 100;
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 0;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .header-brand span { color: var(--rose); }

  .header-user {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .header-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: white;
  }

  .header-username {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink-soft);
  }

  .btn-logout {
    background: none;
    border: 1px solid rgba(200,134,106,0.3);
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    font-size: 0.7rem;
    letter-spacing: 0.1rem;
    text-transform: uppercase;
    color: var(--rose);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Jost', sans-serif;
  }
  .btn-logout:hover { background: var(--rose); color: white; }

  .sync-status {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.7rem;
    color: var(--ink-muted);
    letter-spacing: 0.05rem;
  }
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--sage);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Content */
  .app-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Phase header */
  .phase-block {
    margin-bottom: 3rem;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--rose-light);
  }

  .phase-badge {
    background: linear-gradient(135deg, var(--rose), #d4926f);
    color: white;
    font-size: 0.65rem;
    letter-spacing: 0.15rem;
    text-transform: uppercase;
    padding: 0.4rem 0.8rem;
    border-radius: 20px;
    white-space: nowrap;
  }

  .phase-badge.gold { background: linear-gradient(135deg, var(--gold), #c9a87a); }

  .phase-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--ink);
  }

  .phase-date {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--rose);
    letter-spacing: 0.1rem;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Period group */
  .period-group {
    margin-bottom: 1.5rem;
  }

  .period-label {
    font-size: 0.68rem;
    letter-spacing: 0.2rem;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.8rem;
    padding-left: 0.5rem;
  }

  /* Checklist item */
  .checklist-item {
    background: var(--white);
    border: 1px solid rgba(200,134,106,0.12);
    border-radius: 14px;
    margin-bottom: 0.6rem;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .checklist-item:hover { box-shadow: var(--shadow); border-color: rgba(200,134,106,0.3); }
  .checklist-item.done { background: #fdfaf8; opacity: 0.75; }
  .checklist-item.done .item-text { text-decoration: line-through; color: var(--ink-muted); }

  .item-main {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.2rem;
    cursor: pointer;
  }

  .item-checkbox {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border: 2px solid var(--rose-light);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
    background: white;
  }

  .checklist-item.done .item-checkbox {
    background: var(--rose);
    border-color: var(--rose);
  }

  .item-checkbox svg { display: none; }
  .checklist-item.done .item-checkbox svg { display: block; }

  .item-body { flex: 1; }
  .item-text { font-size: 0.9rem; line-height: 1.4; color: var(--ink-soft); }

  .item-meta {
    display: flex; align-items: center; gap: 0.5rem;
    margin-top: 0.4rem; flex-wrap: wrap;
  }

  .item-tag {
    font-size: 0.65rem;
    letter-spacing: 0.08rem;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    border: 1px solid;
  }

  .tag-done { background: #eef6ee; color: #5a8c5a; border-color: #c0dcc0; }
  .tag-comment { background: #f0f4ff; color: #6070b0; border-color: #c0caee; }
  .tag-file { background: #fff0f0; color: #b05050; border-color: #eec0c0; }

  .item-actions {
    display: flex; gap: 0.5rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .action-btn {
    background: none;
    border: 1px solid rgba(200,134,106,0.2);
    border-radius: 8px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--ink-muted);
    font-size: 0.85rem;
  }

  .action-btn:hover { background: var(--rose-pale); border-color: var(--rose); color: var(--rose); }

  /* Expand panel */
  .item-panel {
    display: none;
    padding: 0 1.2rem 1.2rem;
    border-top: 1px solid var(--rose-light);
    animation: slideDown 0.2s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item-panel.open { display: block; }

  .panel-section { margin-top: 0.8rem; }
  .panel-label {
    font-size: 0.68rem;
    letter-spacing: 0.15rem;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .comment-list { margin-bottom: 0.5rem; }

  .comment-entry {
    background: var(--rose-pale);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.4rem;
    font-size: 0.82rem;
    color: var(--ink-soft);
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .comment-author { font-weight: 500; color: var(--rose); flex-shrink: 0; }
  .comment-text { flex: 1; }
  .comment-time { font-size: 0.65rem; color: var(--ink-muted); flex-shrink: 0; margin-top: 2px; }

  .comment-input-row {
    display: flex; gap: 0.5rem;
  }

  .comment-input {
    flex: 1;
    border: 1px solid var(--rose-light);
    border-radius: 8px;
    padding: 0.5rem 0.8rem;
    font-size: 0.85rem;
    font-family: 'Jost', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    background: white;
    color: var(--ink);
  }

  .comment-input:focus { border-color: var(--rose); }

  .btn-send {
    background: var(--rose);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-send:hover { background: #b87055; }

  .file-list { margin-bottom: 0.5rem; }

  .file-entry {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.6rem;
    background: #fff8f5;
    border: 1px solid rgba(200,134,106,0.15);
    border-radius: 8px;
    margin-bottom: 0.3rem;
    font-size: 0.8rem;
    color: var(--ink-soft);
  }

  .file-entry a { color: var(--rose); text-decoration: none; flex: 1; }
  .file-entry a:hover { text-decoration: underline; }
  .file-entry-icon { font-size: 1rem; }

  .upload-area {
    border: 2px dashed rgba(200,134,106,0.3);
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-area:hover { border-color: var(--rose); background: var(--rose-pale); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-area-text { font-size: 0.78rem; color: var(--ink-muted); }
  .upload-area-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }

  /* Progress */
  .progress-bar-wrap {
    background: var(--white);
    border: 1px solid rgba(200,134,106,0.15);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .progress-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--ink);
    white-space: nowrap;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--rose-light);
    border-radius: 3px;
    overflow: hidden;
    min-width: 100px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-pct {
    font-size: 0.8rem;
    color: var(--rose);
    font-weight: 500;
    white-space: nowrap;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--ink);
    color: white;
    padding: 0.8rem 1.2rem;
    border-radius: 10px;
    font-size: 0.82rem;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    max-width: 280px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0;
    background: rgba(250,247,242,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 500;
    gap: 1rem;
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--rose-light);
    border-top-color: var(--rose);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.8rem; color: var(--ink-muted); letter-spacing: 0.1rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rose-light); border-radius: 3px; }

  @media (max-width: 600px) {
    .header-inner { flex-wrap: wrap; gap: 0.5rem; }
    .phase-header { flex-wrap: wrap; }
    .phase-date { margin-left: 0; }
    .user-card { padding: 1.8rem 2rem; }
  }
</style>
</head>

          'Bincang dan senaraikan barang hantaran kahwin (contoh: 7 berbalas 9).',
          'Beli cincin/gelang batal air sembahyang.',
        ]
      },
      {
        label: 'November 2026 · 2 Bulan Sebelum Kahwin',
        items: [
          'Cetak kad jemputan (fizikal) dan buat kad jemputan digital (e-card).',
          'Beli barang hantaran dan mula tempah gubahan hantaran.',
          'Tempah cenderahati (doorgift) tetamu.',
          'Lantik ahli keluarga/rakan sebagai jawatankuasa majlis (penyambut tetamu, penjaga hadiah, dll).',
        ]
      },
      {
        label: 'Disember 2026 · 1 Bulan Sebelum Kahwin',
        items: [
          'Edarkan kad jemputan (fizikal dan digital).',
          'Hantar borang nikah yang telah lengkap ke Pejabat Agama.',
          'Fitting baju nikah dan sanding buat kali terakhir.',
          'Sahkan (finalize) jumlah tetamu dengan pihak katering.',
          'Siapkan semua gubahan hantaran.',
          'Beli barang keperluan bilik pengantin.',
        ]
      },
      {
        label: 'Januari 2027 · Bulan Perkahwinan',
        items: [
          'Ambil baju pengantin dari butik.',
          'Rehat yang cukup dan jaga kesihatan mental/fizikal.',
          '💍 3 Januari 2027: MAJLIS AKAD NIKAH & RESEPSI',
        ]
      },
    ]
  }
];

// Build flat item ID list
let allItemIds = [];
CHECKLIST.forEach((phase, pi) => {
  phase.periods.forEach((period, ri) => {
    period.items.forEach((_, ii) => {
      allItemIds.push(`${pi}_${ri}_${ii}`);
    });
  });
});

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let state = {}; // { itemId: { done, comments: [{author,text,time}], files: [{name,url}] } }

// ── PETALS ────────────────────────────────────────────────────────────────────
function createPetals() {
  const container = document.getElementById('petals');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = (4 + Math.random() * 6) + 'px';
    p.style.height = (7 + Math.random() * 8) + 'px';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = 0.1 + Math.random() * 0.2;
    container.appendChild(p);
  }
}
createPetals();

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function login(user) {
  currentUser = user;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('headerName').textContent = user;
  document.getElementById('headerAvatar').textContent = user[0];
  showLoading('Memuatkan senarai semak...');
  await loadData();
  hideLoading();
  renderAll();
}

function logout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
}

// ── DATA I/O ──────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=load`);
    const json = await res.json();
    if (json.ok) state = json.data || {};
    else showToast('Gagal memuatkan data. Menggunakan data tempatan.');
  } catch (e) {
    showToast('Offline — data tempatan digunakan.');
    const saved = localStorage.getItem('weddingState');
    if (saved) state = JSON.parse(saved);
  }
}

async function saveData() {
  localStorage.setItem('weddingState', JSON.stringify(state));
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', data: state }),
    });
    document.getElementById('syncStatus').innerHTML = '<div class="sync-dot"></div> Disimpan ✓';
    setTimeout(() => {
      document.getElementById('syncStatus').innerHTML = '<div class="sync-dot"></div> Sync aktif';
    }, 2000);
  } catch (e) {
    showToast('Gagal sync — disimpan secara tempatan.');
  }
}

async function uploadFile(itemId, file) {
  showLoading('Memuat naik fail ke Google Drive...');
  try {
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'upload',
          itemId,
          fileName: file.name,
          fileData: base64,
          mimeType: file.type,
        }),
      });
      const json = await res.json();
      hideLoading();
      if (json.ok) {
        if (!state[itemId]) state[itemId] = {};
        if (!state[itemId].files) state[itemId].files = [];
        state[itemId].files.push({ name: file.name, url: json.url, uploader: currentUser });
        await saveData();
        renderAll();
        showToast('Fail berjaya dimuat naik! 📎');
      } else {
        showToast('Gagal memuat naik fail.');
      }
    };
    reader.readAsDataURL(file);
  } catch (e) {
    hideLoading();
    showToast('Ralat semasa memuat naik fail.');
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('checklistContainer');
  container.innerHTML = '';

  CHECKLIST.forEach((phase, pi) => {
    const phaseBlock = document.createElement('div');
    phaseBlock.className = 'phase-block';

    phaseBlock.innerHTML = `
      <div class="phase-header">
        <div class="phase-badge ${phase.badgeClass}">${phase.badge}</div>
        <div class="phase-title">${phase.phase}</div>
        <div class="phase-date">📅 ${phase.date}</div>
      </div>
    `;

    phase.periods.forEach((period, ri) => {
      const pg = document.createElement('div');
      pg.className = 'period-group';
      pg.innerHTML = `<div class="period-label">${period.label}</div>`;

      period.items.forEach((text, ii) => {
        const id = `${pi}_${ri}_${ii}`;
        const s = state[id] || {};
        const done = s.done || false;
        const comments = s.comments || [];
        const files = s.files || [];

        const item = document.createElement('div');
        item.className = 'checklist-item' + (done ? ' done' : '');
        item.id = `item-${id}`;

        const tags = [
          done ? '<span class="item-tag tag-done">✓ Selesai</span>' : '',
          comments.length ? `<span class="item-tag tag-comment">💬 ${comments.length}</span>` : '',
          files.length ? `<span class="item-tag tag-file">📎 ${files.length}</span>` : '',
        ].filter(Boolean).join('');

        item.innerHTML = `
          <div class="item-main" onclick="toggleExpand('${id}')">
            <div class="item-checkbox" onclick="event.stopPropagation(); toggleDone('${id}')">
              <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
                <path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="item-body">
              <div class="item-text">${text}</div>
              <div class="item-meta">${tags}</div>
            </div>
            <div class="item-actions">
              <button class="action-btn" title="Komen / Fail" onclick="event.stopPropagation(); openPanel('${id}')">
                ✎
              </button>
            </div>
          </div>
          <div class="item-panel" id="panel-${id}">
            <div class="panel-section">
              <div class="panel-label">Komen</div>
              <div class="comment-list" id="comments-${id}">
                ${comments.map(c => `
                  <div class="comment-entry">
                    <span class="comment-author">${c.author}:</span>
                    <span class="comment-text">${c.text}</span>
                    <span class="comment-time">${c.time}</span>
                  </div>
                `).join('')}
              </div>
              <div class="comment-input-row">
                <input class="comment-input" id="ci-${id}" placeholder="Tulis komen..." onkeydown="if(event.key==='Enter') addComment('${id}')">
                <button class="btn-send" onclick="addComment('${id}')">Hantar</button>
              </div>
            </div>
            <div class="panel-section">
              <div class="panel-label">Lampiran Fail</div>
              <div class="file-list" id="files-${id}">
                ${files.map(f => `
                  <div class="file-entry">
                    <span class="file-entry-icon">📎</span>
                    <a href="${f.url}" target="_blank">${f.name}</a>
                    <span style="font-size:0.68rem;color:var(--ink-muted)">${f.uploader||''}</span>
                  </div>
                `).join('')}
              </div>
              <div class="upload-area">
                <input type="file" onchange="handleFileUpload('${id}', this)">
                <div class="upload-area-icon">☁</div>
                <div class="upload-area-text">Klik atau seret fail ke sini<br><small>Fail akan disimpan di Google Drive</small></div>
              </div>
              <div style="margin-top:0.5rem;text-align:right">
                <a href="${DRIVE_FOLDER}" target="_blank" style="font-size:0.72rem;color:var(--gold);text-decoration:none;">
                  📁 Buka Folder Google Drive →
                </a>
              </div>
            </div>
          </div>
        `;

        pg.appendChild(item);
      });

      phaseBlock.appendChild(pg);
    });

    container.appendChild(phaseBlock);
  });

  updateProgress();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function toggleDone(id) {
  if (!state[id]) state[id] = {};
  state[id].done = !state[id].done;
  if (!state[id].comments) state[id].comments = [];
  if (!state[id].files) state[id].files = [];

  const item = document.getElementById(`item-${id}`);
  if (state[id].done) {
    item.classList.add('done');
    showToast('✓ Ditandakan selesai!');
  } else {
    item.classList.remove('done');
    showToast('Ditandakan belum selesai.');
  }

  updateProgress();
  await saveData();
  renderAll();
}

function toggleExpand(id) {
  openPanel(id);
}

function openPanel(id) {
  const panel = document.getElementById(`panel-${id}`);
  const isOpen = panel.classList.contains('open');
  // Close all
  document.querySelectorAll('.item-panel.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) panel.classList.add('open');
}

async function addComment(id) {
  const input = document.getElementById(`ci-${id}`);
  const text = input.value.trim();
  if (!text) return;

  if (!state[id]) state[id] = {};
  if (!state[id].comments) state[id].comments = [];

  const now = new Date();
  state[id].comments.push({
    author: currentUser,
    text,
    time: now.toLocaleDateString('ms-MY', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }),
  });

  input.value = '';
  await saveData();
  renderAll();
  // Re-open panel
  setTimeout(() => openPanel(id), 50);
  showToast('Komen ditambah!');
}

function handleFileUpload(id, input) {
  const file = input.files[0];
  if (!file) return;
  uploadFile(id, file);
}

function updateProgress() {
  const total = allItemIds.length;
  const done = allItemIds.filter(id => state[id] && state[id].done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = `${done}/${total} · ${pct}%`;
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'Memuatkan...';
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto-refresh every 30s
setInterval(async () => {
  if (currentUser) {
    await loadData();
    renderAll();
  }
}, 30000);
</script>
</body>
</html>
