<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majlis Hafiza & Aeizat 💍</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:#C8707A;--rose-light:#F5E6E8;--rose-dark:#8B3A42;
    --gold:#C9A84C;--gold-light:#FBF3E0;--cream:#FAF7F2;
    --dark:#2C2420;--muted:#7A6E6A;--border:rgba(200,112,122,0.2);
    --white:#FFFFFF;--shadow:0 2px 16px rgba(139,58,66,0.08);--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}

  #front-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  .front-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(2rem,6vw,3.8rem);color:var(--rose-dark);text-align:center;line-height:1.1;margin-bottom:0.3rem;}
  .front-subtitle{font-size:0.85rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:0.5rem;}
  .front-dates{font-size:0.8rem;color:var(--muted);text-align:center;margin-bottom:3rem;}
  .divider-ornament{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem;}
  .divider-ornament::before,.divider-ornament::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--rose-light),var(--rose),var(--rose-light),transparent);max-width:120px;}
  .divider-ornament span{font-size:1.1rem;color:var(--rose);}
  .choose-label{font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:1.2rem;}
  .user-cards{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center;}
  .user-card{background:var(--white);border:1.5px solid var(--border);border-radius:18px;padding:2rem 2.5rem;cursor:pointer;transition:all 0.25s ease;text-align:center;min-width:160px;position:relative;overflow:hidden;}
  .user-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--rose-light),transparent);opacity:0;transition:opacity 0.25s;}
  .user-card:hover::before{opacity:1;}
  .user-card:hover{border-color:var(--rose);transform:translateY(-3px);box-shadow:var(--shadow);}
  .user-card .avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1rem;position:relative;z-index:1;}
  .hafiza .avatar{background:var(--rose-light);}
  .aeizat .avatar{background:var(--gold-light);}
  .user-card .name{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--dark);margin-bottom:0.25rem;position:relative;z-index:1;}
  .user-card .role{font-size:0.75rem;color:var(--muted);position:relative;z-index:1;}

  #app{display:none;}
  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
  .topbar-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--dark);}
  .topbar-title{font-family:'Playfair Display',serif;font-style:italic;font-size:1.05rem;color:var(--rose-dark);}
  .topbar-right{display:flex;gap:8px;align-items:center;}
  .btn{border:none;border-radius:8px;padding:0.45rem 0.9rem;font-family:'DM Sans',sans-serif;font-size:0.8rem;cursor:pointer;transition:all 0.2s;font-weight:500;}
  .btn-primary{background:var(--rose);color:#fff;}
  .btn-primary:hover{background:var(--rose-dark);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--rose-light);color:var(--rose-dark);}
  .btn-sm{padding:0.3rem 0.65rem;font-size:0.75rem;}
  .sync-indicator{display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--muted);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
  .sync-dot.synced{background:#4CAF50;}
  .sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite;}
  .sync-dot.error{background:#e53935;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .content{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem;}
  .progress-bar-wrap{background:var(--white);border-radius:var(--radius);padding:1.2rem 1.5rem;margin-bottom:1.5rem;border:1px solid var(--border);}
  .progress-label{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem;}
  .progress-bar{height:6px;border-radius:4px;background:var(--rose-light);overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--gold));border-radius:4px;transition:width 0.4s ease;}
  .phase-header{display:flex;align-items:center;gap:12px;margin:2rem 0 1rem;}
  .phase-badge{background:var(--rose);color:#fff;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.3rem 0.75rem;border-radius:30px;white-space:nowrap;}
  .phase-title{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--dark);}
  .phase-date{font-size:0.78rem;color:var(--gold);font-weight:500;margin-left:auto;white-space:nowrap;}
  .section-header{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--rose);padding:0.6rem 0 0.4rem;margin-bottom:0.4rem;border-bottom:1px solid var(--border);}
  .task-card{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:0.5rem;overflow:hidden;transition:box-shadow 0.2s;}
  .task-card:hover{box-shadow:var(--shadow);}
  .task-card.done{opacity:0.65;}
  .task-card.done .task-text{text-decoration:line-through;}
  .task-main{display:flex;align-items:center;gap:12px;padding:0.75rem 1rem;}
  .task-checkbox{width:20px;height:20px;border:2px solid var(--rose);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;background:transparent;cursor:pointer;}
  .task-card.done .task-checkbox{background:var(--rose);border-color:var(--rose);}
  .task-checkbox svg{display:none;}
  .task-card.done .task-checkbox svg{display:block;}
  .task-text{flex:1;font-size:0.9rem;color:var(--dark);line-height:1.4;}
  .task-expand-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:0.2rem 0.6rem;border-radius:4px;transition:all 0.15s;flex-shrink:0;line-height:1;}
  .task-expand-btn:hover{background:var(--rose-light);color:var(--rose);}
  .task-detail{display:none;border-top:1px solid var(--border);padding:0.75rem 1rem;background:var(--cream);}
  .task-detail.open{display:block;}
  .detail-row{margin-bottom:0.6rem;}
  .detail-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.3rem;}
  .detail-comment{width:100%;border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.75rem;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--dark);background:var(--white);resize:vertical;min-height:60px;outline:none;transition:border-color 0.2s;}
  .detail-comment:focus{border-color:var(--rose);}
  .file-upload-btn{display:inline-flex;align-items:center;gap:6px;border:1.5px dashed var(--border);border-radius:8px;padding:0.55rem 1rem;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.2s;background:none;font-family:'DM Sans',sans-serif;width:100%;justify-content:center;}
  .file-upload-btn:hover{border-color:var(--rose);color:var(--rose);background:var(--rose-light);}
  .attached-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .file-chip{display:flex;align-items:center;gap:5px;background:var(--rose-light);border:1px solid var(--border);border-radius:20px;padding:0.25rem 0.65rem;font-size:0.75rem;color:var(--rose-dark);text-decoration:none;}
  .detail-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.75rem;flex-wrap:wrap;gap:6px;}
  .last-updated{font-size:0.72rem;color:var(--muted);}

  #toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--dark);color:#fff;padding:0.6rem 1.1rem;border-radius:8px;font-size:0.82rem;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;z-index:999;max-width:300px;}
  #toast.show{opacity:1;transform:translateY(0);}
  #toast.ok{background:#2e7d32;}
  #toast.err{background:#c62828;}

  #loading-overlay{position:fixed;inset:0;background:rgba(250,247,242,0.92);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:1rem;}
  .spinner{width:32px;height:32px;border:3px solid var(--rose-light);border-top-color:var(--rose);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:0.85rem;color:var(--muted);}

  @media(max-width:500px){.topbar-title{display:none;}.phase-date{display:none;}.user-card{padding:1.5rem 1.8rem;min-width:130px;}}
</style>
</head>
<body>

<div id="front-page">
  <div class="front-logo">Hafiza & Aeizat</div>
  <div class="front-subtitle">Wedding Planner</div>
  <div class="front-dates">Tunang: 30 Ogos 2026 &nbsp;·&nbsp; Nikah: 3 Januari 2027</div>
  <div class="divider-ornament"><span>✦</span></div>
  <div class="choose-label">Siapa anda?</div>
  <div class="user-cards">
    <div class="user-card hafiza" onclick="selectUser('Hafiza')">
      <div class="avatar">🌸</div>
      <div class="name">Hafiza</div>
      <div class="role">Pengantin Perempuan</div>
    </div>
    <div class="user-card aeizat" onclick="selectUser('Aeizat')">
      <div class="avatar">💍</div>
      <div class="name">Aeizat</div>
      <div class="role">Pengantin Lelaki</div>
    </div>
  </div>
</div>

<div id="loading-overlay" style="display:none">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Memuatkan senarai semak...</div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-avatar" id="tb-avatar"></div>
      <div>
        <div style="font-size:0.7rem;color:var(--muted)">Log masuk sebagai</div>
        <div class="topbar-name" id="tb-name"></div>
      </div>
    </div>
    <div class="topbar-title">Senarai Semak Majlis</div>
    <div class="topbar-right">
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="syncAll()">⟳ Sync</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Tukar</button>
    </div>
  </div>
  <div class="content">
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>Kemajuan Keseluruhan</span><span id="progress-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div id="tasks-container"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ⚠️ PASTE URL APPS SCRIPT ANDA DI SINI (selepas deploy)
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3pmH7uE-pMfw_5p5AzRIBhWQnTjTQvWeh2ne8W17uWAFBXNMcBSk9iBE6pM9ELrCTMg/exec';
const DRIVE_URL = 'https://drive.google.com/drive/folders/1jRcBD1xTyifIfS83VusqKC8J1ZYcv3Iw';

let currentUser = null;
let tasksData = {};

const PHASES = [
  { id:'tunang', label:'Fasa 1: Pertunangan', badge:'Fasa 1', date:'30 Ogos 2026', sections:[
    { label:'April – Mei 2026 (4–5 Bulan Sebelum Tunang)', tasks:[
      {id:'t01',text:'Bincang dengan kedua-dua belah keluarga (bajet, lokasi, dan jumlah jemputan).'},
      {id:'t02',text:'Tetapkan tema warna majlis.'},
      {id:'t03',text:'Beli/tempah cincin risik dan cincin tunang.'},
      {id:'t04',text:'Cari inspirasi dan senaraikan barang dulang hantaran (contoh: 5 berbalas 7).'},
    ]},
    { label:'Jun – Julai 2026 (1–2 Bulan Sebelum Tunang)', tasks:[
      {id:'t05',text:'Tempah baju tunang.'},
      {id:'t06',text:'Tempah jurusolek (MUA) dan jurugambar (jika perlu).'},
      {id:'t07',text:'Tempah mini pelamin (jika buat di rumah) atau tempah lokasi.'},
      {id:'t08',text:'Beli barang hantaran dan gubahan dulang.'},
      {id:'t09',text:'Tempah katering atau rancang menu masakan keluarga.'},
      {id:'t10',text:'Sediakan cenderahati (doorgift) ringkas untuk tetamu.'},
    ]},
    { label:'Ogos 2026 (Bulan Pertunangan)', tasks:[
      {id:'t11',text:'Fitting baju tunang.'},
      {id:'t12',text:'Siapkan gubahan hantaran sepenuhnya.'},
      {id:'t13',text:'Bersihkan dan kemaskan kawasan rumah/lokasi majlis.'},
      {id:'t14',text:'🌹 30 Ogos 2026: MAJLIS PERTUNANGAN',important:true},
    ]},
  ]},
  { id:'nikah', label:'Fasa 2: Perkahwinan', badge:'Fasa 2', date:'3 Januari 2027', sections:[
    { label:'September 2026 (4 Bulan Sebelum Kahwin)', tasks:[
      {id:'k01',text:'Hadir Kursus Pra-Perkahwinan (jika belum).'},
      {id:'k02',text:'Bincang bajet keseluruhan majlis perkahwinan.'},
      {id:'k03',text:'Tempah lokasi/dewan majlis dan khemah (jika buat di rumah).'},
      {id:'k04',text:'Tempah katering untuk majlis perkahwinan.'},
      {id:'k05',text:'Tempah Pakej Perkahwinan (Pelamin, Baju Nikah & Sanding).'},
      {id:'k06',text:'Tempah MUA, Jurugambar dan Juruvideo.'},
    ]},
    { label:'Oktober 2026 (3 Bulan Sebelum Kahwin)', tasks:[
      {id:'k07',text:'Buat Ujian Saringan HIV di klinik kesihatan.'},
      {id:'k08',text:'Sediakan dokumen dan isi borang kebenaran berkahwin (online/pejabat agama).'},
      {id:'k09',text:'Cari Tok Kadi dan tetapkan masa akad nikah.'},
      {id:'k10',text:'Bincang dan senaraikan barang hantaran kahwin (contoh: 7 berbalas 9).'},
      {id:'k11',text:'Beli cincin/gelang batal air sembahyang.'},
    ]},
    { label:'November 2026 (2 Bulan Sebelum Kahwin)', tasks:[
      {id:'k12',text:'Cetak kad jemputan (fizikal) dan buat kad jemputan digital (e-card).'},
      {id:'k13',text:'Beli barang hantaran dan mula tempah gubahan hantaran.'},
      {id:'k14',text:'Tempah cenderahati (doorgift) tetamu.'},
      {id:'k15',text:'Lantik ahli keluarga/rakan sebagai jawatankuasa majlis.'},
    ]},
    { label:'Disember 2026 (1 Bulan Sebelum Kahwin)', tasks:[
      {id:'k16',text:'Edarkan kad jemputan (fizikal dan digital).'},
      {id:'k17',text:'Hantar borang nikah yang telah lengkap ke Pejabat Agama.'},
      {id:'k18',text:'Fitting baju nikah dan sanding buat kali terakhir.'},
      {id:'k19',text:'Sahkan (finalize) jumlah tetamu dengan pihak katering.'},
      {id:'k20',text:'Siapkan semua gubahan hantaran.'},
      {id:'k21',text:'Beli barang keperluan bilik pengantin.'},
    ]},
    { label:'Januari 2027 (Bulan Perkahwinan)', tasks:[
      {id:'k22',text:'Ambil baju pengantin dari butik.'},
      {id:'k23',text:'Rehat yang cukup dan jaga kesihatan mental/fizikal.'},
      {id:'k24',text:'💒 3 Januari 2027: MAJLIS AKAD NIKAH & RESEPSI',important:true},
    ]},
  ]},
];

// ── USER ──
function selectUser(name) {
  currentUser = name;
  document.getElementById('front-page').style.display = 'none';
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('app').style.display = 'block';
  const av = document.getElementById('tb-avatar');
  av.textContent = name==='Hafiza'?'🌸':'💍';
  av.style.background = name==='Hafiza'?'var(--rose-light)':'var(--gold-light)';
  document.getElementById('tb-name').textContent = name;
  loadFromSheet();
}
function logout() {
  currentUser=null; tasksData={};
  document.getElementById('front-page').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ── RENDER ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isDone(id){const d=tasksData[id]?.done;return d===true||d==='true'||d==='TRUE';}
function nowStr(){return new Date().toLocaleString('ms-MY',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}

function renderTasks() {
  const c = document.getElementById('tasks-container');
  c.innerHTML = '';
  PHASES.forEach(phase => {
    const ph = document.createElement('div');
    ph.innerHTML = `<div class="phase-header"><span class="phase-badge">${phase.badge}</span><span class="phase-title">${phase.label}</span><span class="phase-date">📅 ${phase.date}</span></div>`;
    c.appendChild(ph);
    phase.sections.forEach(sec => {
      const sh = document.createElement('div');
      sh.innerHTML = `<div class="section-header">${sec.label}</div>`;
      c.appendChild(sh);
      sec.tasks.forEach(task => buildCard(c, task));
    });
  });
  updateProgress();
}

function buildCard(container, task) {
  const td = tasksData[task.id] || {};
  const done = isDone(task.id);
  const files = td.files || [];
  const card = document.createElement('div');
  card.className = `task-card${done?' done':''}`;
  card.id = `card-${task.id}`;

  const fileChips = files.map(f=>`<a class="file-chip" href="${esc(f.url||DRIVE_URL)}" target="_blank">📄 ${esc(f.name)}</a>`).join('');
  const updatedTxt = td.updatedBy ? `✏️ ${esc(td.updatedBy)} · ${esc(td.updatedAt||'')}` : '';
  const importantStyle = task.important ? ' style="font-weight:600;color:var(--rose-dark)"' : '';

  card.innerHTML = `
    <div class="task-main">
      <div class="task-checkbox" id="chk-${task.id}" onclick="toggleDone('${task.id}')">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="task-text"${importantStyle}>${esc(task.text)}</span>
      <button class="task-expand-btn" onclick="toggleExpand('${task.id}')">+</button>
    </div>
    <div class="task-detail" id="detail-${task.id}">
      <div class="detail-row">
        <div class="detail-label">📝 Nota / Komen</div>
        <textarea class="detail-comment" id="comment-${task.id}" placeholder="Tambah nota di sini...">${esc(td.comment||'')}</textarea>
      </div>
      <div class="detail-row">
        <div class="detail-label">📎 Fail Lampiran &nbsp;<a href="${DRIVE_URL}" target="_blank" style="color:var(--rose);font-size:0.7rem">Buka Google Drive ↗</a></div>
        <button class="file-upload-btn" onclick="document.getElementById('file-${task.id}').click()">📂 Pilih fail untuk direkod</button>
        <input type="file" id="file-${task.id}" multiple style="display:none" onchange="handleFiles('${task.id}')">
        <div class="attached-files" id="files-${task.id}">${fileChips}</div>
      </div>
      <div class="detail-footer">
        <span class="last-updated" id="updated-${task.id}">${updatedTxt}</span>
        <button class="btn btn-primary btn-sm" onclick="saveTask('${task.id}')">💾 Simpan</button>
      </div>
    </div>`;
  container.appendChild(card);
}

function toggleExpand(id) {
  const det = document.getElementById(`detail-${id}`);
  const btn = det.previousElementSibling.querySelector('.task-expand-btn');
  det.classList.toggle('open');
  btn.textContent = det.classList.contains('open') ? '−' : '+';
}

function toggleDone(id) {
  if (!tasksData[id]) tasksData[id] = {};
  tasksData[id].done = !isDone(id);
  tasksData[id].updatedBy = currentUser;
  tasksData[id].updatedAt = nowStr();
  // grab comment if panel is open
  const cel = document.getElementById(`comment-${id}`);
  if (cel) tasksData[id].comment = cel.value;
  refreshCardDone(id);
  updateProgress();
  saveToSheet(id);
}

function refreshCardDone(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.classList.toggle('done', isDone(id));
}

function saveTask(id) {
  if (!tasksData[id]) tasksData[id] = {};
  const cel = document.getElementById(`comment-${id}`);
  if (cel) tasksData[id].comment = cel.value;
  tasksData[id].updatedBy = currentUser;
  tasksData[id].updatedAt = nowStr();
  const uEl = document.getElementById(`updated-${id}`);
  if (uEl) uEl.textContent = `✏️ ${currentUser} · ${tasksData[id].updatedAt}`;
  saveToSheet(id);
}

function handleFiles(id) {
  const input = document.getElementById(`file-${id}`);
  if (!input.files.length) return;
  if (!tasksData[id]) tasksData[id] = {};
  if (!tasksData[id].files) tasksData[id].files = [];
  Array.from(input.files).forEach(f => {
    tasksData[id].files.push({name:f.name, url:DRIVE_URL, by:currentUser});
    const chip = document.createElement('a');
    chip.className = 'file-chip';
    chip.href = DRIVE_URL; chip.target = '_blank';
    chip.textContent = '📄 ' + f.name;
    document.getElementById(`files-${id}`).appendChild(chip);
  });
  tasksData[id].updatedBy = currentUser;
  tasksData[id].updatedAt = nowStr();
  saveToSheet(id);
  window.open(DRIVE_URL, '_blank');
  toast('📤 Sila upload fail ke Google Drive yang dibuka!', 'ok');
}

function updateProgress() {
  const all = PHASES.flatMap(p=>p.sections.flatMap(s=>s.tasks.map(t=>t.id)));
  const done = all.filter(isDone).length;
  const pct = Math.round(done/all.length*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = `${done}/${all.length} (${pct}%)`;
}

// ══════════════════════════════════════════════
//  JSONP — avoids CORS entirely
//  Apps Script must return: callback({...})
// ══════════════════════════════════════════════
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = 'jcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout — semak URL Apps Script')); }, 20000);
    function cleanup() { clearTimeout(timer); delete window[cb]; const s=document.getElementById(cb); if(s)s.remove(); }
    window[cb] = data => { cleanup(); resolve(data); };
    const qs = Object.entries({...params, callback:cb}).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const s = document.createElement('script');
    s.id = cb; s.src = SCRIPT_URL + '?' + qs;
    s.onerror = () => { cleanup(); reject(new Error('Gagal sambung ke Apps Script')); };
    document.head.appendChild(s);
  });
}

function notConfigured() {
  return SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE' || !SCRIPT_URL;
}

async function saveToSheet(taskId) {
  if (notConfigured()) { toast('⚠️ SCRIPT_URL belum diisi dalam kod HTML','err'); return; }
  setSyncing();
  const td = tasksData[taskId] || {};
  try {
    const r = await jsonp({
      action:'save', taskId,
      done: isDone(taskId) ? 'true' : 'false',
      comment: td.comment||'',
      files: JSON.stringify(td.files||[]),
      updatedBy: td.updatedBy||currentUser,
      updatedAt: td.updatedAt||nowStr(),
    });
    if (r && r.success) { setSynced(); toast('✓ Disimpan!','ok'); }
    else throw new Error(r?.error||'Ralat tidak diketahui');
  } catch(e) {
    console.error(e);
    setSyncError();
    toast('⚠ ' + e.message, 'err');
  }
}

async function loadFromSheet() {
  if (notConfigured()) {
    document.getElementById('loading-overlay').style.display='none';
    renderTasks();
    toast('⚠️ SCRIPT_URL belum diisi — data tidak disync','err');
    return;
  }
  document.getElementById('loading-text').textContent = 'Memuatkan data dari Google Sheets...';
  try {
    const r = await jsonp({action:'load'});
    if (r && r.tasks) tasksData = r.tasks;
    setSynced();
  } catch(e) {
    console.error(e);
    setSyncError();
    toast('⚠ ' + e.message,'err');
  } finally {
    document.getElementById('loading-overlay').style.display='none';
    renderTasks();
  }
}

async function syncAll() {
  document.getElementById('loading-overlay').style.display='flex';
  document.getElementById('loading-text').textContent='Menyegerakkan...';
  await loadFromSheet();
}

function setSyncing(){document.getElementById('sync-dot').className='sync-dot syncing';document.getElementById('sync-label').textContent='Menyimpan...';}
function setSynced(){document.getElementById('sync-dot').className='sync-dot synced';document.getElementById('sync-label').textContent='Tersimpan';}
function setSyncError(){document.getElementById('sync-dot').className='sync-dot error';document.getElementById('sync-label').textContent='Ralat';}

let toastT;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type?' '+type:'');
  clearTimeout(toastT);
  toastT = setTimeout(()=>{ el.className=''; }, 3500);
}
