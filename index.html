<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Kahwin</title>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #ffd1dc, #c1f0dc);
}

/* POPUP */
#popup {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 80%;
    max-width: 320px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #e91e63;
    color: white;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
    margin: 8px 0;
}

/* HEADER */
header {
    text-align: center;
    padding: 15px;
    color: white;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 900px;
    margin: auto;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* TASK */
.task {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

input[type="text"], input[type="file"] {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input[type="checkbox"] {
    transform: scale(1.2);
}

/* FILE LINK */
.fileLink a {
    color: #e91e63;
    text-decoration: none;
    font-size: 14px;
}

/* PROGRESS */
.progress {
    height: 18px;
    background: #ddd;
    margin: 10px;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    background: #e91e63;
    width: 0%;
    color: white;
    text-align: center;
    font-size: 12px;
    border-radius: 10px;
}

/* DESKTOP VIEW */
@media (min-width: 768px) {
    .task {
        flex-direction: row;
        align-items: center;
        gap: 10px;
    }
    .task input[type="text"] {
        width: 25%;
    }
    .task input[type="file"] {
        width: 25%;
    }
    button {
        width: auto;
    }
}
</style>
</head>
<body>

<!-- POPUP -->
<div id="popup">
    <div class="popup-box">
        <h2>Pilih Pengguna</h2>
        <button onclick="selectUser('Hafiza')">Hafiza</button>
        <button onclick="selectUser('Aeizat')">Aeizat</button>
    </div>
</div>

<header>
<h1>💍 Checklist Kahwin</h1>
<p id="userDisplay"></p>
</header>

<div class="progress">
    <div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="container" id="app"></div>

<script>
// =====================
// CONFIG
// =====================
const URL = "https://script.google.com/macros/s/AKfycbxk3mJnR0X6lnhz6j_4L1IttWJq9JIB1j3QJPNQC3DZXLldJ59yDhAIAo1yxWYTwjs/exec";
let currentUser = "";
let total = 0;
let completed = 0;

// =====================
// CHECKLIST DATA
// =====================
const data = {
  "6–12 Bulan": ["Bajet","Konsep","Venue","Katering","Dekorasi","Kursus kahwin","Simpan duit"],
  "4–6 Bulan": ["Baju","Photographer","MUA","Tetamu","Kad kahwin","Hantaran"],
  "3 Bulan": ["Borang nikah","Ujian HIV","Confirm vendor","Tempah kad","Doorgift"],
  "2 Bulan": ["Result HIV","Hantar borang","Finalize tetamu","Print kad","Edar kad"],
  "1 Bulan": ["Fitting","Hantaran","Doorgift","Flow","Vendor"],
  "2 Minggu": ["Call vendor","Brief family","Flow majlis","Prepare IC"],
  "1 Minggu": ["Recheck","Emergency kit","Rehat"],
  "1 Hari": ["Barang","Jurunikah","Rehearsal","Tidur"],
  "Hari Kahwin": ["IC","Dokumen","Wali","Mas kahwin","Cincin","Enjoy"]
};

// =====================
// SELECT USER
// =====================
function selectUser(user){
    currentUser = user;
    document.getElementById("popup").style.display = "none";
    document.getElementById("userDisplay").innerText = user + " | 3 Januari 2026";
    createUI();
    setTimeout(()=>loadUserData(user), 500); // wait for UI to render
}

// =====================
// CREATE CHECKLIST UI
// =====================
function createUI(){
    const app = document.getElementById("app");
    app.innerHTML = "";
    total = 0;
    completed = 0;

    Object.keys(data).forEach(section => {
        let card = document.createElement("div");
        card.className = "card";

        let title = document.createElement("h2");
        title.innerText = section;
        card.appendChild(title);

        data[section].forEach(task => {
            total++;

            let div = document.createElement("div");
            div.className = "task";

            div.innerHTML = `
                <label><input type="checkbox"> ${task}</label>
                <input type="text" placeholder="Remark">
                <input type="file">
                <div class="fileLink"></div>
            `;

            let checkbox = div.querySelector("input[type=checkbox]");
            checkbox.addEventListener("change", function(){
                updateProgress();
                saveData(section, task, checkbox, div);
            });

            div.querySelector("input[type=text]").addEventListener("blur", function(){
                saveData(section, task, checkbox, div);
            });

            div.querySelector("input[type=file]").addEventListener("change", function(){
                saveData(section, task, checkbox, div);
            });

            card.appendChild(div);
        });

        app.appendChild(card);
    });
}

// =====================
// SAVE / UPDATE DATA
// =====================
function saveData(section, task, checkbox, div){
    let remark = div.querySelector("input[type=text]").value;
    let fileInput = div.querySelector("input[type=file]");
    let file = fileInput.files[0];

    if(file){
        let reader = new FileReader();
        reader.onload = function(){
            let base64 = reader.result.split(",")[1];
            sendToServer(section, task, checkbox, remark, base64, file.name, file.type, div);
        };
        reader.readAsDataURL(file);
    } else {
        sendToServer(section, task, checkbox, remark, "", "", "", div);
    }
}

// =====================
// SEND TO GOOGLE SHEETS
// =====================
function sendToServer(section, task, checkbox, remark, base64, fileName, fileType, div){
    fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            user: currentUser,
            section: section,
            task: task,
            status: checkbox.checked ? "Done" : "Pending",
            remark: remark,
            file: base64,
            fileName: fileName,
            fileType: fileType
        })
    }).then(res=>res.json())
      .then(data=>{
          if(data.result==="success" && data.fileUrl){
              div.querySelector(".fileLink").innerHTML = `<a href="${data.fileUrl}" target="_blank">View File</a>`;
          }
      });
}

// =====================
// LOAD EXISTING DATA
// =====================
function loadUserData(user){
    fetch(URL + "?user=" + user)
    .then(res => res.json())
    .then(data => {
        data.forEach(item => {
            let divs = document.querySelectorAll(".card .task");
            divs.forEach(div => {
                let label = div.querySelector("label");
                if(label && label.innerText.includes(item.task)){
                    div.querySelector("input[type=checkbox]").checked = (item.status === "Done");
                    div.querySelector("input[type=text]").value = item.remark;
                    if(item.fileUrl){
                        div.querySelector(".fileLink").innerHTML = `<a href="${item.fileUrl}" target="_blank">View File</a>`;
                    }
                }
            });
        });
        updateProgress();
    });
}

// =====================
// UPDATE PROGRESS BAR
// =====================
function updateProgress(){
    let totalTasks = document.querySelectorAll(".task input[type=checkbox]").length;
    let checked = document.querySelectorAll(".task input[type=checkbox]:checked").length;
    let percent = Math.round((checked/totalTasks)*100);
    let bar = document.getElementById("progressBar");
    bar.style.width = percent + "%";
    bar.innerText = percent + "%";
}
</script>
</body>
</html>
